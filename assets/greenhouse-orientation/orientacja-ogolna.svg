<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560" role="img" aria-labelledby="title desc">
  <title id="title">Orientacja ogolna na szklarni</title>
  <desc id="desc">Uproszczony plan szklarni z nawa, przejsciem, przeslem oraz lewa i prawa strona.</desc>
  <style>
    text{font-family:Arial,Helvetica,sans-serif}
    .bg{fill:#f7faf8}.frame{fill:#fff;stroke:#d6e1da;stroke-width:4}.row{fill:#2f8f55}.row2{fill:#65b77b}
    .pass{fill:#fff7d8;stroke:#d8aa20;stroke-width:5;stroke-dasharray:16 10}.span{fill:#f6d65d;stroke:#b38614;stroke-width:4}
    .line{stroke:#42564a;stroke-width:5}.side{fill:#eaf8ef;stroke:#0f5f3f;stroke-width:3}
    .arrow{stroke:#0f5f3f;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;fill:none}
    .label{fill:#0f5f3f;font-weight:900;font-size:28px}.small{fill:#42564a;font-weight:800;font-size:20px}.top{fill:#7a5512;font-weight:900;font-size:24px}
  </style>
  <rect class="bg" width="800" height="560" rx="28"/>
  <rect class="frame" x="52" y="78" width="696" height="360" rx="22"/>
  <rect class="side" x="70" y="96" width="92" height="316" rx="14"/>
  <rect class="side" x="638" y="96" width="92" height="316" rx="14"/>
  <text x="116" y="262" text-anchor="middle" class="label" transform="rotate(-90 116 262)">LEWA</text>
  <text x="684" y="262" text-anchor="middle" class="label" transform="rotate(90 684 262)">PRAWA</text>
  <rect class="pass" x="350" y="104" width="100" height="296" rx="18"/>
  <rect class="row" x="190" y="116" width="54" height="268" rx="18"/>
  <rect class="row2" x="270" y="116" width="54" height="268" rx="18"/>
  <rect class="row" x="484" y="116" width="54" height="268" rx="18"/>
  <rect class="row2" x="564" y="116" width="54" height="268" rx="18"/>
  <rect class="span" x="256" y="210" width="84" height="86" rx="14"/>
  <line class="line" x1="164" y1="188" x2="636" y2="188"/>
  <line class="line" x1="164" y1="318" x2="636" y2="318"/>
  <path class="arrow" d="M400 452 L400 388"/>
  <path class="arrow" d="M400 388 L374 414 M400 388 L426 414"/>
  <text x="400" y="62" text-anchor="middle" class="top">KIERUNEK PIERWSZYCH NAW</text>
  <text x="220" y="450" text-anchor="middle" class="small">NAWA</text>
  <text x="400" y="450" text-anchor="middle" class="small">PRZEJŚCIE</text>
  <text x="298" y="332" text-anchor="middle" class="small">PRZĘSŁO</text>
  <text x="400" y="506" text-anchor="middle" class="label">ORIENTACJA NA SZKLARNI</text>
  <text x="400" y="535" text-anchor="middle" class="small">BAY / PASSAGE / SPAN / LEFT / RIGHT</text>
</svg>
