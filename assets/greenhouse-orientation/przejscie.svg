<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Przejscie / passage</title>
  <desc id="desc">Dwa rzedy roslin i wolne przejscie posrodku.</desc>
  <style>
    text{font-family:Arial,Helvetica,sans-serif}
    .bg{fill:#f7faf8}.frame{fill:#fff;stroke:#d6e1da;stroke-width:4}.plant{fill:#2f8f55}.light{fill:#65b77b}
    .pass{fill:#fff7d8;stroke:#d8aa20;stroke-width:5;stroke-dasharray:18 12}
    .arrow{stroke:#0f5f3f;stroke-width:11;stroke-linecap:round;stroke-linejoin:round;fill:none}
    .label{fill:#0f5f3f;font-weight:900;font-size:40px}.small{fill:#42564a;font-weight:800;font-size:23px}
    .person{fill:#0f5f3f}
  </style>
  <rect class="bg" width="800" height="520" rx="28"/>
  <rect class="frame" x="52" y="70" width="696" height="340" rx="22"/>
  <rect class="plant" x="90" y="100" width="170" height="280" rx="28"/>
  <rect class="light" x="540" y="100" width="170" height="280" rx="28"/>
  <rect class="pass" x="308" y="92" width="184" height="296" rx="20"/>
  <circle class="person" cx="400" cy="216" r="30"/>
  <rect class="person" x="376" y="246" width="48" height="78" rx="22"/>
  <path class="arrow" d="M400 350 L400 122"/>
  <path class="arrow" d="M400 122 L372 154 M400 122 L428 154"/>
  <text x="400" y="462" text-anchor="middle" class="label">PRZEJŚCIE / PASSAGE</text>
  <text x="400" y="494" text-anchor="middle" class="small">ПРОХОД / ПРОХІД / KEÇİD</text>
</svg>
