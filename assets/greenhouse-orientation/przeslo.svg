    <line class="post" x1="316" y1="120" x2="316" y2="340"/>
    <line class="post" x1="448" y1="120" x2="448" y2="340"/>
    <line class="post" x1="580" y1="120" x2="580" y2="340"/>
  </g>
  <g opacity=".95">
