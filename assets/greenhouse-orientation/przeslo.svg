    .span{fill:#f6d65d;stroke:#b38614;stroke-width:5}.post{stroke:#42564a;stroke-width:8;stroke-linecap:round}
    .plant{fill:#2f8f55}.label{fill:#0f5f3f;font-weight:900;font-size:42px}.small{fill:#42564a;font-weight:800;font-size:24px}
    .arrow{stroke:#0f5f3f;stroke-width:10;stroke-linecap:round;stroke-linejoin:round;fill:none}
