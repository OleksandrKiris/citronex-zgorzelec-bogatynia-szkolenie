    <circle class="plant" cx="382" cy="226" r="17"/><circle class="plant" cx="514" cy="226" r="17"/>
    <circle class="plant" cx="646" cy="226" r="17"/>
  </g>
  <path class="arrow" d="M400 408 L400 306"/>
  <path class="arrow" d="M400 306 L376 332 M400 306 L424 332"/>
  <text x="400" y="456" text-anchor="middle" class="label">PRZĘSŁO / SPAN</text>
  <text x="400" y="490" text-anchor="middle" class="small">ПРОЛЁТ / ПРОЛІТ / BÖLMƏ</text>
