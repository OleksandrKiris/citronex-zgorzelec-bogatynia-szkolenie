  <rect class="bg" width="800" height="520" rx="28"/>
  <rect class="frame" x="48" y="82" width="704" height="310" rx="22"/>
  <rect class="row" x="86" y="168" width="628" height="118" rx="28"/>
  <rect class="span" x="316" y="154" width="132" height="146" rx="18"/>
  <g>
